name: Actualizar datos del meta coreano

on:
  schedule:
    # Todos los días a las 06:00 UTC (03:00 en Argentina, después del prime time coreano)
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write         # necesario para hacer push del data.json actualizado

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de actualización
        run: python scripts/update_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if git diff --cached --quiet; then
            echo "Sin cambios en data.json — no se hace commit."
          else
            git commit -m "chore(data): actualización automática del meta KR ($(date -u +'%Y-%m-%d'))"
            git push
          fi
